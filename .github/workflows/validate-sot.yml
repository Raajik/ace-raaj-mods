name: Source-of-Truth Validation

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validate_sot.sh
        run: bash scripts/validate_sot.sh

      - name: Upload audit log on failure
        if: failure()
        run: |
          echo "Source-of-Truth audit failed. See validate_sot.sh output above."
          exit 1
